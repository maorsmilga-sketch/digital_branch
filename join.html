<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הצטרפות לקהילה – הסניף הדיגטלי</title>
  <meta name="description" content="הצטרפו לקהילת הסניף הדיגטלי – מלאו פרטים והצטרפו עכשיו." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #06091a;
      --card: rgba(255, 255, 255, 0.03);
      --text: #e4e7f1;
      --muted: #8b93b8;
      --gold: #f0b429;
      --gold-light: #f7d070;
      --gold-glow: rgba(240, 180, 41, 0.25);
      --blue: #6366f1;
      --border: rgba(255, 255, 255, 0.06);
      --border-gold: rgba(240, 180, 41, 0.2);
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Heebo", "Segoe UI", Arial, sans-serif;
      direction: rtl;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 70% 50% at 30% -5%, rgba(99, 102, 241, 0.13), transparent),
        radial-gradient(ellipse 60% 40% at 75% 110%, rgba(240, 180, 41, 0.08), transparent);
    }

    .page-wrap { width: min(540px, 100%); }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
      margin-bottom: 28px;
      justify-content: center;
    }

    .logo-wrap {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      border: 1px solid var(--border-gold);
      background: linear-gradient(145deg, rgba(240, 180, 41, 0.12), rgba(99, 102, 241, 0.08));
      display: grid;
      place-items: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .logo-wrap img {
      width: 84%;
      height: 84%;
      object-fit: contain;
      filter: brightness(1.15) contrast(1.05) drop-shadow(0 2px 8px rgba(0, 0, 0, 0.4));
    }

    .brand-text { display: flex; flex-direction: column; gap: 1px; }
    .brand-name { font-size: 1.06rem; font-weight: 700; color: #fff; }
    .brand-tagline { font-size: 0.78rem; color: var(--muted); }

    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(22px, 4vw, 36px);
      animation: fadeUp 0.6s ease both;
      position: relative;
      overflow: hidden;
    }

    .form-card::before {
      content: "";
      position: absolute;
      top: -1px;
      left: 15%;
      right: 15%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-glow), transparent);
    }

    .form-title {
      font-size: 1.45rem;
      color: #fff;
      font-weight: 800;
      margin-bottom: 6px;
      text-align: center;
    }

    .form-subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
      margin-bottom: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }

    .field label {
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 500;
    }

    .field input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 11px;
      color: #fff;
      padding: 12px 14px;
      font-size: 0.96rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(240, 180, 41, 0.12);
    }

    .field input::placeholder { color: #4b5278; }

    .terms-check {
      margin: 14px 0 18px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .terms-check input[type="checkbox"] {
      margin-top: 3px;
      width: 17px;
      height: 17px;
      accent-color: var(--gold);
      cursor: pointer;
      flex-shrink: 0;
    }

    .terms-check label { cursor: pointer; line-height: 1.55; }

    .terms-check a {
      color: var(--gold-light);
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .btn {
      display: inline-block;
      padding: 13px 24px;
      border-radius: 12px;
      border: none;
      text-decoration: none;
      font-weight: 700;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
      width: 100%;
      text-align: center;
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold), #e6a817);
      color: #0a0c1a;
      box-shadow: 0 4px 20px var(--gold-glow), inset 0 1px 0 rgba(255, 255, 255, 0.25);
    }

    .btn-gold:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px var(--gold-glow);
      filter: brightness(1.08);
    }

    .btn-gold:disabled { opacity: 0.65; cursor: wait; transform: none; }

    .status {
      min-height: 22px;
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    .status.success { color: var(--gold-light); }
    .status.error { color: #fca5a5; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: var(--muted);
      font-size: 0.88rem;
      text-decoration: none;
      transition: color 0.2s;
    }

    .back-link:hover { color: #fff; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 540px) {
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <a class="brand" href="index.html" aria-label="חזרה לאתר הראשי">
      <span class="logo-wrap">
        <img src="הסניף הדיגטלי.png" alt="לוגו הסניף הדיגטלי" />
      </span>
      <span class="brand-text">
        <span class="brand-name">הסניף הדיגטלי</span>
        <span class="brand-tagline">קהילת פוקר לשחקנים שחושבים קדימה</span>
      </span>
    </a>

    <div class="form-card">
      <h1 class="form-title">הצטרפות לקהילה</h1>
      <p class="form-subtitle">מלאו את הפרטים הבאים כדי להצטרף לסניף הדיגטלי</p>

      <form id="join-form">
        <div class="form-grid">
          <div class="field">
            <label for="first-name">שם פרטי</label>
            <input id="first-name" name="firstName" type="text" required />
          </div>
          <div class="field">
            <label for="last-name">שם משפחה</label>
            <input id="last-name" name="lastName" type="text" required />
          </div>
          <div class="field">
            <label for="phone">טלפון</label>
            <input id="phone" name="phone" type="tel" required />
          </div>
          <div class="field">
            <label for="nickname">כינוי</label>
            <input id="nickname" name="nickname" type="text" required />
          </div>
        </div>

        <div class="terms-check">
          <input id="terms-approve" name="termsApproved" type="checkbox" required />
          <label for="terms-approve">
            אני מאשר/ת כי קראתי את
            <a href="terms.html" target="_blank" rel="noopener noreferrer">התקנון ותנאי השימוש</a>
            ואני מסכים/ה לתנאיו.
          </label>
        </div>

        <button class="btn btn-gold" type="submit" id="join-submit-btn">שליחה</button>
        <p class="status" id="join-status"></p>
      </form>
    </div>

    <a class="back-link" href="index.html">&#8592; חזרה לאתר הראשי</a>
  </div>

  <script>
    const SHEETS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxyxlweU7myx53mqtplB69NQjAjrUhae1jF9nlrKY_ECozK-MvwRwrPNiUimUa1d4nJ/exec";

    const joinForm = document.getElementById("join-form");
    const joinStatus = document.getElementById("join-status");
    const joinSubmitBtn = document.getElementById("join-submit-btn");

    function setStatus(message, type) {
      joinStatus.textContent = message;
      joinStatus.classList.remove("success", "error");
      if (type) joinStatus.classList.add(type);
    }

    function formatTimestamp(date) {
      const pad = (n) => String(n).padStart(2, "0");
      return [
        pad(date.getDate()),
        pad(date.getMonth() + 1),
        date.getFullYear(),
      ].join("/") + " " + [
        pad(date.getHours()),
        pad(date.getMinutes()),
        pad(date.getSeconds()),
      ].join(":");
    }

    async function getVisitorContext() {
      const deviceDetails = [
        navigator.platform || "",
        navigator.userAgent || "",
        navigator.language || "",
      ].filter(Boolean).join(" | ");

      const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "";

      const context = {
        ipAddress: "",
        locationText: "",
        latitude: "",
        longitude: "",
        deviceInfo: deviceDetails,
        timezone: timezone,
      };

      try {
        const response = await fetch("https://ipapi.co/json/");
        if (!response.ok) return context;
        const data = await response.json();

        context.ipAddress = String(data.ip || "");
        context.latitude = data.latitude != null ? String(data.latitude) : "";
        context.longitude = data.longitude != null ? String(data.longitude) : "";

        const city = String(data.city || "").trim();
        const region = String(data.region || "").trim();
        const country = String(data.country_name || "").trim();
        context.locationText = [city, region, country].filter(Boolean).join(", ");

        return context;
      } catch (error) {
        return context;
      }
    }

    joinForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const formData = new FormData(joinForm);
      const now = new Date();
      const visitorContext = await getVisitorContext();
      const payload = {
        firstName: String(formData.get("firstName") || "").trim(),
        lastName: String(formData.get("lastName") || "").trim(),
        phone: String(formData.get("phone") || "").trim(),
        nickname: String(formData.get("nickname") || "").trim(),
        termsApproved: formData.get("termsApproved") === "on",
        termsApprovedText: formData.get("termsApproved") === "on" ? "כן" : "לא",
        termsApprovedAt: formData.get("termsApproved") === "on" ? formatTimestamp(now) : "",
        createdAt: formatTimestamp(now),
        ipAddress: visitorContext.ipAddress,
        locationText: visitorContext.locationText,
        latitude: visitorContext.latitude,
        longitude: visitorContext.longitude,
        deviceInfo: visitorContext.deviceInfo,
        timezone: visitorContext.timezone,
      };

      if (!payload.termsApproved) {
        setStatus("יש לאשר את התקנון ותנאי השימוש לפני שליחה.", "error");
        return;
      }

      const phoneIsValid = /^[0-9+\-\s]{8,15}$/.test(payload.phone);
      if (!phoneIsValid) {
        setStatus("מספר הטלפון לא תקין. נא לבדוק ולנסות שוב.", "error");
        return;
      }

      joinSubmitBtn.disabled = true;
      setStatus("שולח פרטים...", null);

      try {
        await fetch(SHEETS_WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(payload),
        });

        setStatus("הפרטים נשמרו בהצלחה. תודה שהצטרפת!", "success");
        joinForm.reset();
      } catch (error) {
        setStatus("השליחה נכשלה. נסה שוב בעוד רגע.", "error");
      } finally {
        joinSubmitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
