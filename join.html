<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הצטרפות לקהילה – הסניף הדיגטלי</title>
  <meta name="description" content="הצטרפו לקהילת הסניף הדיגטלי – מלאו פרטים והצטרפו עכשיו." />
  <style>
    :root {
      --bg: #0a0f0d;
      --card: rgba(255, 255, 255, 0.04);
      --text: #edfff5;
      --muted: #a3c4b5;
      --accent: #34d399;
      --accent-strong: #6ee7b7;
      --teal: #10b981;
      --border: rgba(255, 255, 255, 0.08);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      direction: rtl;
      color: var(--text);
      background:
        radial-gradient(ellipse at 20% 0%, rgba(52, 211, 153, 0.16), transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(16, 185, 129, 0.1), transparent 50%),
        var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page-wrap {
      width: min(560px, 100%);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
      margin-bottom: 28px;
      justify-content: center;
    }

    .logo-wrap {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      border: 1px solid rgba(52, 211, 153, 0.3);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01));
      display: grid;
      place-items: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
    }

    .logo-wrap img {
      width: 86%;
      height: 86%;
      object-fit: contain;
      filter: brightness(1.2) contrast(1.08) drop-shadow(0 2px 10px rgba(0, 0, 0, 0.45));
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .brand-name {
      font-size: 1.08rem;
      font-weight: 700;
    }

    .brand-tagline {
      font-size: 0.8rem;
      color: var(--muted);
    }

    .form-card {
      background: var(--card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(18px, 4vw, 32px);
      animation: fadeUp 0.6s ease both;
    }

    .form-title {
      font-size: 1.4rem;
      color: #fff;
      font-weight: 700;
      margin-bottom: 6px;
      text-align: center;
    }

    .form-subtitle {
      color: var(--muted);
      font-size: 0.96rem;
      text-align: center;
      margin-bottom: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-size: 0.9rem;
      color: var(--muted);
    }

    .field input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      padding: 11px 12px;
      font-size: 0.97rem;
      outline: none;
      transition: 0.2s ease;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(52, 211, 153, 0.22);
    }

    .terms-check {
      margin: 12px 0;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .terms-check input[type="checkbox"] {
      margin-top: 2px;
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    .terms-check label {
      cursor: pointer;
      line-height: 1.5;
    }

    .terms-check a {
      color: var(--accent-strong);
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    .btn {
      display: inline-block;
      padding: 12px 22px;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s ease;
      cursor: pointer;
      font-size: 1rem;
      width: 100%;
      text-align: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #fff;
      border-color: rgba(110, 231, 183, 0.4);
      box-shadow: 0 0 24px rgba(52, 211, 153, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      filter: brightness(1.07);
    }

    .btn-primary:disabled {
      opacity: 0.72;
      cursor: wait;
    }

    .status {
      min-height: 22px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
    }

    .status.success { color: var(--accent-strong); }
    .status.error { color: #ffacac; }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      color: var(--muted);
      font-size: 0.9rem;
      text-decoration: none;
    }

    .back-link:hover { color: #fff; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 540px) {
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <a class="brand" href="index.html" aria-label="חזרה לאתר הראשי">
      <span class="logo-wrap">
        <img src="הסניף הדיגטלי.png" alt="לוגו הסניף הדיגטלי" />
      </span>
      <span class="brand-text">
        <span class="brand-name">הסניף הדיגטלי</span>
        <span class="brand-tagline">קהילת פוקר לשחקנים שחושבים קדימה</span>
      </span>
    </a>

    <div class="form-card">
      <h1 class="form-title">הצטרפות לקהילה</h1>
      <p class="form-subtitle">מלאו את הפרטים הבאים כדי להצטרף לסניף הדיגטלי</p>

      <form id="join-form">
        <div class="form-grid">
          <div class="field">
            <label for="first-name">שם פרטי</label>
            <input id="first-name" name="firstName" type="text" required />
          </div>
          <div class="field">
            <label for="last-name">שם משפחה</label>
            <input id="last-name" name="lastName" type="text" required />
          </div>
          <div class="field">
            <label for="phone">טלפון</label>
            <input id="phone" name="phone" type="tel" required />
          </div>
          <div class="field">
            <label for="nickname">כינוי</label>
            <input id="nickname" name="nickname" type="text" required />
          </div>
        </div>

        <div class="terms-check">
          <input id="terms-approve" name="termsApproved" type="checkbox" required />
          <label for="terms-approve">
            אני מאשר/ת כי קראתי את
            <a href="terms.html" target="_blank" rel="noopener noreferrer">התקנון ותנאי השימוש</a>
            ואני מסכים/ה לתנאיו.
          </label>
        </div>

        <button class="btn btn-primary" type="submit" id="join-submit-btn">שליחה</button>
        <p class="status" id="join-status"></p>
      </form>
    </div>

    <a class="back-link" href="index.html">חזרה לאתר הראשי</a>
  </div>

  <script>
    const SHEETS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxyxlweU7myx53mqtplB69NQjAjrUhae1jF9nlrKY_ECozK-MvwRwrPNiUimUa1d4nJ/exec";

    const joinForm = document.getElementById("join-form");
    const joinStatus = document.getElementById("join-status");
    const joinSubmitBtn = document.getElementById("join-submit-btn");

    function setStatus(message, type) {
      joinStatus.textContent = message;
      joinStatus.classList.remove("success", "error");
      if (type) joinStatus.classList.add(type);
    }

    function formatTimestamp(date) {
      const pad = (n) => String(n).padStart(2, "0");
      return [
        pad(date.getDate()),
        pad(date.getMonth() + 1),
        date.getFullYear(),
      ].join("/") + " " + [
        pad(date.getHours()),
        pad(date.getMinutes()),
        pad(date.getSeconds()),
      ].join(":");
    }

    async function getVisitorContext() {
      const deviceDetails = [
        navigator.platform || "",
        navigator.userAgent || "",
        navigator.language || "",
      ].filter(Boolean).join(" | ");

      const timezone = Intl.DateTimeFormat().resolvedOptions().timeZone || "";

      const context = {
        ipAddress: "",
        locationText: "",
        latitude: "",
        longitude: "",
        deviceInfo: deviceDetails,
        timezone: timezone,
      };

      try {
        const response = await fetch("https://ipapi.co/json/");
        if (!response.ok) return context;
        const data = await response.json();

        context.ipAddress = String(data.ip || "");
        context.latitude = data.latitude != null ? String(data.latitude) : "";
        context.longitude = data.longitude != null ? String(data.longitude) : "";

        const city = String(data.city || "").trim();
        const region = String(data.region || "").trim();
        const country = String(data.country_name || "").trim();
        context.locationText = [city, region, country].filter(Boolean).join(", ");

        return context;
      } catch (error) {
        return context;
      }
    }

    joinForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const formData = new FormData(joinForm);
      const now = new Date();
      const visitorContext = await getVisitorContext();
      const payload = {
        firstName: String(formData.get("firstName") || "").trim(),
        lastName: String(formData.get("lastName") || "").trim(),
        phone: String(formData.get("phone") || "").trim(),
        nickname: String(formData.get("nickname") || "").trim(),
        termsApproved: formData.get("termsApproved") === "on",
        termsApprovedText: formData.get("termsApproved") === "on" ? "כן" : "לא",
        termsApprovedAt: formData.get("termsApproved") === "on" ? formatTimestamp(now) : "",
        createdAt: formatTimestamp(now),
        ipAddress: visitorContext.ipAddress,
        locationText: visitorContext.locationText,
        latitude: visitorContext.latitude,
        longitude: visitorContext.longitude,
        deviceInfo: visitorContext.deviceInfo,
        timezone: visitorContext.timezone,
      };

      if (!payload.termsApproved) {
        setStatus("יש לאשר את התקנון ותנאי השימוש לפני שליחה.", "error");
        return;
      }

      const phoneIsValid = /^[0-9+\-\s]{8,15}$/.test(payload.phone);
      if (!phoneIsValid) {
        setStatus("מספר הטלפון לא תקין. נא לבדוק ולנסות שוב.", "error");
        return;
      }

      joinSubmitBtn.disabled = true;
      setStatus("שולח פרטים...", null);

      try {
        await fetch(SHEETS_WEB_APP_URL, {
          method: "POST",
          mode: "no-cors",
          body: JSON.stringify(payload),
        });

        setStatus("הפרטים נשמרו בהצלחה. תודה שהצטרפת!", "success");
        joinForm.reset();
      } catch (error) {
        setStatus("השליחה נכשלה. נסה שוב בעוד רגע.", "error");
      } finally {
        joinSubmitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
