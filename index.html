<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מור רוזנברג - ניהול מטופלים</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; }
        .calendar-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        .time-slot { min-height: 90px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; transition: all 0.2s; }
        .appointment-item { cursor: pointer; font-size: 0.75rem; padding: 6px; border-radius: 8px; color: white; text-align: center; font-weight: 700; transition: transform 0.1s; }
        .appointment-item:active { transform: scale(0.95); }
        .status-paid { background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.3); }
        .status-unpaid { background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.3); }
        .meeting-badge { background: rgba(255,255,255,0.25); padding: 1px 4px; border-radius: 4px; font-size: 0.65rem; margin-left: 4px; }
        @media (max-width: 768px) { .calendar-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="text-slate-800">

<div class="min-h-screen flex flex-col">
    <nav class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-indigo-600">Rozenberg <span class="text-slate-400 font-light">Pro</span></h1>
            <div class="flex items-center gap-2">
                <button onclick="changeWeek(-1)" class="p-2 hover:bg-slate-100 rounded-full transition text-indigo-600">◀</button>
                <span id="currentWeekDisplay" class="font-bold text-sm min-w-[120px] text-center"></span>
                <button onclick="changeWeek(1)" class="p-2 hover:bg-slate-100 rounded-full transition text-indigo-600">▶</button>
                <button onclick="goToday()" class="bg-indigo-50 text-indigo-600 px-4 py-1.5 rounded-full text-sm font-bold border border-indigo-100">היום</button>
            </div>
            <div id="loader" class="hidden animate-spin rounded-full h-5 w-5 border-2 border-indigo-600 border-t-transparent"></div>
        </div>
    </nav>

    <div class="flex flex-col md:flex-row flex-grow container mx-auto gap-4 p-4">
        <aside class="w-full md:w-64 bg-white rounded-2xl shadow-sm p-4 border border-slate-200 h-fit sticky top-24">
            <h2 class="font-bold text-slate-500 text-xs uppercase tracking-wider mb-4">מטופלים</h2>
            <div class="flex gap-2 mb-4">
                <input type="text" id="newPatientName" placeholder="שם חדש..." class="w-full bg-slate-50 border-none rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-400">
                <button onclick="addPatient()" class="bg-indigo-600 text-white px-3 py-2 rounded-lg hover:bg-indigo-700 transition">+</button>
            </div>
            <div id="patientList" class="space-y-2 max-h-[50vh] overflow-y-auto"></div>
        </aside>

        <main class="flex-grow">
            <div class="calendar-grid text-center font-bold text-slate-400 mb-2 text-[10px] uppercase tracking-widest">
                <div id="head-0">ראשון</div><div id="head-1">שני</div><div id="head-2">שלישי</div>
                <div id="head-3">רביעי</div><div id="head-4">חמישי</div><div id="head-5">שישי</div>
            </div>
            <div class="calendar-grid" id="scheduleBoard"></div>
        </main>
    </div>
</div>

<div id="editModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center z-[100] p-4">
    <div class="bg-white rounded-3xl p-6 max-w-lg w-full shadow-2xl border border-white">
        <div class="flex justify-between items-center mb-6">
            <h3 id="editModalTitle" class="text-xl font-bold text-slate-800">פרטי מפגש</h3>
            <button onclick="closeEditModal()" class="text-slate-400 hover:text-slate-600">✕</button>
        </div>
        
        <div class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">מיקום</label>
                    <select id="editLocation" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-400">
                        <option value="טירת הכרמל">טירת הכרמל</option>
                        <option value="עתלית">עתלית</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">סטטוס תשלום</label>
                    <select id="editPaid" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-400 font-bold">
                        <option value="לא" class="text-red-500">לא שולם ❌</option>
                        <option value="כן" class="text-green-500">שולם ✅</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">סיכום פגישה</label>
                <textarea id="editSummary" rows="3" placeholder="מה היה בטיפול..." class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-400"></textarea>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-400 mb-1">הערות כלליות</label>
                <textarea id="editNotes" rows="2" placeholder="דגשים להמשך..." class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm focus:ring-2 focus:ring-indigo-400"></textarea>
            </div>
        </div>

        <div class="flex gap-3 mt-8">
            <button onclick="updateAppointmentData()" class="flex-1 bg-indigo-600 text-white py-3 rounded-2xl font-bold shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition">שמור שינויים</button>
            <button onclick="closeEditModal()" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-2xl font-bold hover:bg-slate-200 transition">ביטול</button>
        </div>
    </div>
</div>

<div id="locationModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-[100] p-4">
    <div class="bg-white rounded-[2rem] p-8 max-w-sm w-full shadow-2xl">
        <h3 class="text-2xl font-black mb-1 text-center text-slate-800">מיקום המפגש</h3>
        <p id="modalInfo" class="text-sm text-center text-slate-400 mb-8 font-medium"></p>
        <div class="grid grid-cols-1 gap-4">
            <button onclick="confirmInitialLocation('טירת הכרמל')" class="bg-indigo-600 text-white py-4 rounded-2xl font-bold text-lg shadow-lg">טירת הכרמל</button>
            <button onclick="confirmInitialLocation('עתלית')" class="bg-indigo-400 text-white py-4 rounded-2xl font-bold text-lg shadow-lg">עתלית</button>
        </div>
        <button onclick="cancelAppointment()" class="w-full mt-6 text-slate-400 text-sm hover:underline">ביטול</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby4OQaXfT4c1zvHjSaNQ0EEWuuwxDJJRkp1CPEhCZooOCl2lk4EQnoD8TdSxfAoirse/exec';
    let patients = [], appointments = [], currentStartDate = new Date(), tempApp = null, activeEditApp = null;

    const daysNames = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי'];
    const workHours = { week: { start: 13, end: 21 }, friday: { start: 8, end: 12 } };

    function setStartToSunday(date) {
        const d = new Date(date);
        d.setDate(d.getDate() - d.getDay());
        d.setHours(0,0,0,0);
        return d;
    }
    currentStartDate = setStartToSunday(new Date());

    function createCalendar() {
        const board = document.getElementById('scheduleBoard');
        board.innerHTML = '';
        for(let i=0; i<6; i++) {
            const d = new Date(currentStartDate);
            d.setDate(d.getDate() + i);
            document.getElementById(`head-${i}`).innerHTML = `${daysNames[i]}<br><span class="text-slate-300 font-normal">${d.getDate()}/${d.getMonth()+1}</span>`;
        }
        const endOfWeek = new Date(currentStartDate);
        endOfWeek.setDate(endOfWeek.getDate() + 5);
        document.getElementById('currentWeekDisplay').innerText = `${currentStartDate.getDate()}/${currentStartDate.getMonth()+1} - ${endOfWeek.getDate()}/${endOfWeek.getMonth()+1}`;

        for (let hour = 8; hour <= 20; hour++) {
            for (let dIndex = 0; dIndex < 6; dIndex++) {
                const config = dIndex === 5 ? workHours.friday : workHours.week;
                const d = new Date(currentStartDate); d.setDate(d.getDate() + dIndex);
                const dateKey = d.toISOString().split('T')[0];
                const slotId = `slot-${dateKey}-${hour}`;
                const div = document.createElement('div');
                if (hour >= config.start && hour < config.end) {
                    div.className = "time-slot p-1 flex flex-col";
                    div.innerHTML = `<span class="text-[8px] text-slate-300 w-full text-left font-bold">${hour}:00</span><div id="${slotId}" data-date="${dateKey}" data-hour="${hour}:00" class="slot-container flex-grow"></div>`;
                } else { div.className = "bg-slate-50 opacity-30 rounded-xl border border-transparent"; }
                board.appendChild(div);
            }
        }
        initDragAndDrop();
        renderAppointments();
    }

    function initDragAndDrop() {
        new Sortable(document.getElementById('patientList'), { group: { name:'shared', pull:'clone', put:false }, sort:false, animation:150 });
        document.querySelectorAll('.slot-container').forEach(el => {
            new Sortable(el, {
                group: 'shared', animation: 150,
                onAdd: (evt) => {
                    tempApp = { patientName: evt.item.innerText.replace('✕','').trim(), date: evt.target.dataset.date, hour: evt.target.dataset.hour, element: evt.item };
                    document.getElementById('modalInfo').innerText = `${tempApp.patientName} | ${tempApp.hour}`;
                    document.getElementById('locationModal').classList.replace('hidden', 'flex');
                }
            });
        });
    }

    async function confirmInitialLocation(loc) {
        document.getElementById('locationModal').classList.replace('flex', 'hidden');
        showLoader(true);
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'saveAppointment', ...tempApp, location: loc, paid: 'לא' }) });
        tempApp = null; loadData();
    }

    function openEditModal(app) {
        activeEditApp = app;
        document.getElementById('editModalTitle').innerText = `${app.PatientName} (#${app.meetingNum})`;
        document.getElementById('editLocation').value = app.Location;
        document.getElementById('editPaid').value = app.Paid === 'כן' ? 'כן' : 'לא';
        document.getElementById('editSummary').value = app.Summary || '';
        document.getElementById('editNotes').value = app.Notes || '';
        document.getElementById('editModal').classList.replace('hidden', 'flex');
    }

    function closeEditModal() { document.getElementById('editModal').classList.replace('flex', 'hidden'); activeEditApp = null; }

    async function updateAppointmentData() {
        showLoader(true);
        const updated = {
            ...activeEditApp,
            action: 'updateAppointment',
            location: document.getElementById('editLocation').value,
            paid: document.getElementById('editPaid').value,
            summary: document.getElementById('editSummary').value,
            notes: document.getElementById('editNotes').value
        };
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(updated) });
        closeEditModal(); loadData();
    }

    async function loadData() {
        showLoader(true);
        try {
            const res = await fetch(SCRIPT_URL); const data = await res.json();
            patients = data.patients; appointments = data.appointments;
            renderPatients(); renderAppointments();
        } catch (e) { console.error(e); }
        showLoader(false);
    }

    function renderPatients() {
        const list = document.getElementById('patientList'); list.innerHTML = '';
        patients.forEach(p => {
            const div = document.createElement('div');
            div.className = "patient-card bg-slate-50 text-slate-700 p-3 rounded-xl text-sm font-bold flex justify-between items-center cursor-grab hover:bg-indigo-50 transition";
            div.innerHTML = `<span>${p.Name}</span> <button onclick="deletePatient('${p.ID}')" class="text-slate-300 hover:text-red-500">✕</button>`;
            list.appendChild(div);
        });
    }

    function renderAppointments() {
        document.querySelectorAll('.slot-container').forEach(c => c.innerHTML = '');
        appointments.forEach(app => {
            const container = document.getElementById(`slot-${app.Date}-${parseInt(app.Hour)}`);
            if (container) {
                const div = document.createElement('div');
                div.className = `appointment-item ${app.Paid === 'כן' ? 'status-paid' : 'status-unpaid'}`;
                div.innerHTML = `<span class="meeting-badge">#${app.meetingNum}</span><span>${app.PatientName}</span><br><span class="text-[7px] opacity-70 font-normal">${app.Location}</span>`;
                div.onclick = () => openEditModal(app);
                container.appendChild(div);
            }
        });
    }

    function cancelAppointment() { if(tempApp?.element) tempApp.element.remove(); document.getElementById('locationModal').classList.replace('flex', 'hidden'); }
    function changeWeek(n) { currentStartDate.setDate(currentStartDate.getDate() + (n*7)); createCalendar(); loadData(); }
    function goToday() { currentStartDate = setStartToSunday(new Date()); createCalendar(); loadData(); }
    async function addPatient() {
        const name = document.getElementById('newPatientName').value; if(!name) return;
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'addPatient', name }) });
        document.getElementById('newPatientName').value = ''; loadData();
    }
    async function deletePatient(id) { if(confirm('למחוק?')) { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deletePatient', id }) }); loadData(); } }
    function showLoader(s) { document.getElementById('loader').classList.toggle('hidden', !s); }

    createCalendar(); loadData();
</script>
</body>
</html>
