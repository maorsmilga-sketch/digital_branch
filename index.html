<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcWiz Pro - מערכת ניהול</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; }
        .calendar-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
        .time-slot { min-height: 100px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; position: relative; }
        .appointment-item { cursor: pointer; font-size: 0.75rem; padding: 6px; border-radius: 8px; color: white; text-align: center; font-weight: 700; transition: all 0.2s; z-index: 10; }
        .status-paid { background: linear-gradient(135deg, #10b981, #059669); }
        .status-unpaid { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .meeting-badge { background: rgba(255,255,255,0.25); padding: 1px 4px; border-radius: 4px; font-size: 0.65rem; margin-left: 4px; }
        @media (max-width: 768px) { .calendar-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="min-h-screen flex flex-col">
    <nav class="bg-white border-b p-4 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-bold text-indigo-600">ArcWiz</h1>
        <div class="flex items-center gap-3">
            <button onclick="changeWeek(-1)" class="p-2 hover:bg-slate-100 rounded-full">◀</button>
            <span id="currentWeekDisplay" class="font-bold text-sm"></span>
            <button onclick="changeWeek(1)" class="p-2 hover:bg-slate-100 rounded-full">▶</button>
            <button onclick="goToday()" class="bg-indigo-50 text-indigo-600 px-4 py-1 rounded-full text-xs font-bold border">היום</button>
        </div>
        <div id="loader" class="hidden animate-spin rounded-full h-5 w-5 border-2 border-indigo-600 border-t-transparent"></div>
    </nav>

    <div class="flex flex-col md:flex-row flex-grow container mx-auto gap-4 p-4">
        <aside class="w-full md:w-64 space-y-4">
            <div class="bg-white rounded-2xl p-4 border shadow-sm">
                <h2 class="font-bold text-slate-400 text-xs uppercase mb-3">מטופלים</h2>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="newPatientName" placeholder="שם..." class="w-full bg-slate-50 border rounded-lg p-2 text-sm outline-none">
                    <button onclick="addPatient()" class="bg-indigo-600 text-white px-3 py-1 rounded-lg">+</button>
                </div>
                <div id="patientList" class="space-y-2 max-h-[30vh] overflow-y-auto"></div>
            </div>

            <div class="bg-white rounded-2xl p-4 border shadow-sm text-center">
                <h2 class="font-bold text-slate-400 text-xs uppercase mb-3">דוח חודשי</h2>
                <select id="exportMonth" class="w-full bg-slate-50 border rounded-lg p-2 text-sm mb-2">
                    <option value="0">ינואר</option><option value="1">פברואר</option><option value="2">מרץ</option>
                    <option value="3">אפריל</option><option value="4">מאי</option><option value="5">יוני</option>
                    <option value="6">יולי</option><option value="7">אוגוסט</option><option value="8">ספטמבר</option>
                    <option value="9">אוקטובר</option><option value="10">נובמבר</option><option value="11">דצמבר</option>
                </select>
                <button onclick="exportToExcel()" class="w-full bg-emerald-600 text-white py-2 rounded-lg font-bold text-xs">הורד אקסל</button>
            </div>
        </aside>

        <main class="flex-grow">
            <div class="calendar-grid text-center font-bold text-slate-400 mb-2 text-[10px] uppercase">
                <div id="head-0">ראשון</div><div id="head-1">שני</div><div id="head-2">שלישי</div>
                <div id="head-3">רביעי</div><div id="head-4">חמישי</div><div id="head-5">שישי</div>
            </div>
            <div class="calendar-grid" id="scheduleBoard"></div>
        </main>
    </div>
</div>

<div id="editModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center z-[100] p-4">
    <div class="bg-white rounded-3xl p-6 max-w-lg w-full shadow-2xl">
        <h3 id="editModalTitle" class="text-xl font-bold mb-4">פרטי פגישה</h3>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <select id="editLocation" class="bg-slate-50 p-3 rounded-xl text-sm"><option value="טירת הכרמל">טירת הכרמל</option><option value="עתלית">עתלית</option></select>
            <select id="editPaid" class="bg-slate-50 p-3 rounded-xl text-sm font-bold"><option value="לא">לא שולם ❌</option><option value="כן">שולם ✅</option></select>
        </div>
        <textarea id="editSummary" rows="4" placeholder="סיכום פגישה..." class="w-full bg-slate-50 p-3 rounded-xl text-sm mb-4"></textarea>
        <textarea id="editNotes" rows="2" placeholder="הערות..." class="w-full bg-slate-50 p-3 rounded-xl text-sm mb-4"></textarea>
        <div class="flex gap-2">
            <button onclick="updateAppointmentData()" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold">שמור</button>
            <button onclick="closeEditModal()" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold">ביטול</button>
        </div>
    </div>
</div>

<div id="locationModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center z-[100] p-4">
    <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center">
        <h3 class="text-xl font-bold mb-6">מיקום המפגש?</h3>
        <div class="space-y-3">
            <button onclick="confirmInitialLocation('טירת הכרמל')" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">טירת הכרמל</button>
            <button onclick="confirmInitialLocation('עתלית')" class="w-full bg-indigo-400 text-white py-4 rounded-xl font-bold">עתלית</button>
            <button onclick="cancelAppointment()" class="text-slate-400 text-sm underline pt-2">ביטול</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz-mmahrQMw4mSUEqCYZbo5TMywn6bBO6dn_I_wWsADBe0uLImBY6gaB6w5FUU-jt_o/exec';
    let patients = [], appointments = [], currentStartDate = new Date(), tempApp = null, activeEditApp = null;

    function setStartToSunday(date) {
        const d = new Date(date);
        d.setDate(d.getDate() - d.getDay());
        d.setHours(0,0,0,0);
        return d;
    }
    currentStartDate = setStartToSunday(new Date());

    const daysNames = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי'];
    const workHours = { week: { start: 13, end: 21 }, friday: { start: 8, end: 12 } };

    function createCalendar() {
        const board = document.getElementById('scheduleBoard');
        board.innerHTML = '';
        for(let i=0; i<6; i++) {
            const d = new Date(currentStartDate); d.setDate(d.getDate() + i);
            document.getElementById(`head-${i}`).innerHTML = `${daysNames[i]}<br><span class="text-slate-300 font-normal">${d.getDate()}/${d.getMonth()+1}</span>`;
        }
        document.getElementById('currentWeekDisplay').innerText = `שבוע ${currentStartDate.getDate()}/${currentStartDate.getMonth()+1}`;

        for (let hour = 8; hour <= 20; hour++) {
            for (let dIndex = 0; dIndex < 6; dIndex++) {
                const config = dIndex === 5 ? workHours.friday : workHours.week;
                const d = new Date(currentStartDate); d.setDate(d.getDate() + dIndex);
                const dateKey = d.toISOString().split('T')[0];
                const hourFormatted = `${hour}:00`;
                const slotId = `slot-${dateKey}-${hourFormatted}`;
                const div = document.createElement('div');
                if (hour >= config.start && hour < config.end) {
                    div.className = "time-slot p-1 flex flex-col";
                    div.innerHTML = `<span class="text-[8px] text-slate-200 font-bold">${hour}:00</span><div id="${slotId}" data-date="${dateKey}" data-hour="${hourFormatted}" class="slot-container flex-grow"></div>`;
                } else { div.className = "bg-slate-50 opacity-20 border border-transparent"; }
                board.appendChild(div);
            }
        }
        initDragAndDrop(); renderAppointments();
    }

    function initDragAndDrop() {
        new Sortable(document.getElementById('patientList'), { group: { name:'shared', pull:'clone', put:false }, sort:false, animation:150 });
        document.querySelectorAll('.slot-container').forEach(el => {
            new Sortable(el, { group: 'shared', animation: 150, onAdd: (evt) => {
                tempApp = { patientName: evt.item.innerText.replace('✕','').trim(), date: evt.target.dataset.date, hour: evt.target.dataset.hour, element: evt.item };
                document.getElementById('locationModal').classList.replace('hidden', 'flex');
            }});
        });
    }

    async function confirmInitialLocation(loc) {
        document.getElementById('locationModal').classList.replace('flex', 'hidden');
        showLoader(true);
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'saveAppointment', ...tempApp, location: loc, paid: 'לא' }) });
        tempApp = null; loadData();
    }

    function openEditModal(app) {
        activeEditApp = app;
        document.getElementById('editModalTitle').innerText = `${app.PatientName} (#${app.meetingNum})`;
        document.getElementById('editLocation').value = app.Location || 'טירת הכרמל';
        document.getElementById('editPaid').value = app.Paid === 'כן' ? 'כן' : 'לא';
        document.getElementById('editSummary').value = app.Summary || '';
        document.getElementById('editNotes').value = app.Notes || '';
        document.getElementById('editModal').classList.replace('hidden', 'flex');
    }

    async function updateAppointmentData() {
        showLoader(true);
        const updated = { ...activeEditApp, action: 'updateAppointment', location: document.getElementById('editLocation').value, paid: document.getElementById('editPaid').value, summary: document.getElementById('editSummary').value, notes: document.getElementById('editNotes').value };
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(updated) });
        closeEditModal(); loadData();
    }

    async function loadData() {
        showLoader(true);
        try {
            const res = await fetch(SCRIPT_URL); const data = await res.json();
            patients = data.patients; appointments = data.appointments;
            renderPatients(); renderAppointments();
        } catch (e) { console.error(e); }
        showLoader(false);
    }

    function renderPatients() {
        const list = document.getElementById('patientList'); list.innerHTML = '';
        patients.forEach(p => {
            list.innerHTML += `<div class="bg-slate-50 p-2 rounded-lg text-sm font-bold flex justify-between items-center cursor-grab mb-2"><span>${p.Name}</span><button onclick="deletePatient('${p.ID}')" class="text-slate-300 hover:text-red-500">✕</button></div>`;
        });
    }

    function renderAppointments() {
        document.querySelectorAll('.slot-container').forEach(c => c.innerHTML = '');
        appointments.forEach(app => {
            const container = document.getElementById(`slot-${app.Date}-${app.Hour}`);
            if (container) {
                const div = document.createElement('div');
                div.className = `appointment-item ${app.Paid === 'כן' ? 'status-paid' : 'status-unpaid'}`;
                div.innerHTML = `<span class="meeting-badge">#${app.meetingNum}</span>${app.PatientName}<br><span class="text-[7px] opacity-70">${app.Location}</span>`;
                div.onclick = () => openEditModal(app);
                container.appendChild(div);
            }
        });
    }

    function exportToExcel() {
        const month = parseInt(document.getElementById('exportMonth').value);
        const filtered = appointments.filter(app => new Date(app.Date).getMonth() === month);
        if (filtered.length === 0) return alert("אין פגישות בחודש זה");
        const worksheet = XLSX.utils.json_to_sheet(filtered);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "סיכום");
        XLSX.writeFile(workbook, `Report_${month+1}.xlsx`);
    }

    function closeEditModal() { document.getElementById('editModal').classList.replace('flex', 'hidden'); activeEditApp = null; }
    function cancelAppointment() { if(tempApp?.element) tempApp.element.remove(); document.getElementById('locationModal').classList.replace('flex', 'hidden'); }
    function changeWeek(n) { currentStartDate.setDate(currentStartDate.getDate() + (n*7)); createCalendar(); loadData(); }
    function goToday() { currentStartDate = setStartToSunday(new Date()); createCalendar(); loadData(); }
    async function addPatient() {
        const name = document.getElementById('newPatientName').value; if(!name) return;
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'addPatient', name }) });
        document.getElementById('newPatientName').value = ''; loadData();
    }
    async function deletePatient(id) { if(confirm('למחוק?')) { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deletePatient', id }) }); loadData(); } }
    function showLoader(s) { document.getElementById('loader').classList.toggle('hidden', !s); }

    createCalendar(); loadData();
</script>
</body>
</html>
