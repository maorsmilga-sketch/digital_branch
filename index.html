<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<title>יומן קליניקה – מור רוזנברג</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

<style>
body {
  font-family: Arial;
  background:#f5f5f5;
  margin:0;
}
header {
  background:#2c7be5;
  color:white;
  padding:12px;
  text-align:center;
  font-size:20px;
}
#container {
  display:flex;
  flex-direction:column;
}
#patients {
  background:white;
  padding:10px;
}
.patient {
  padding:10px;
  margin:5px 0;
  background:#eee;
  border-radius:6px;
  cursor:grab;
}
#calendar {
  display:grid;
  grid-template-columns:80px repeat(6,1fr);
}
.hour {
  border:1px solid #ddd;
  height:70px;
}
.slot {
  border:1px solid #ddd;
  position:relative;
}
.appt {
  position:absolute;
  inset:0;
  padding:5px;
  color:white;
}
.paid {background:#2ecc71;}
.unpaid {background:#f1948a;}
</style>
</head>

<body>
<header>יומן טיפולים – מור רוזנברג</header>

<div id="patients"></div>
<div id="calendar"></div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;inset:0;background:#0008;">
  <div style="background:white;margin:10% auto;padding:15px;width:90%;max-width:400px;">
    <textarea id="summary" placeholder="סיכום פגישה" style="width:100%;height:80px"></textarea>
    <input id="session" type="number"><br><br>
    <label>שולם <input id="paid" type="checkbox"></label><br><br>
    <select id="location">
      <option>עתלית</option>
      <option>טירת הכרמל</option>
    </select><br><br>
    <button onclick="save()">שמור</button>
    <button onclick="closeModal()">סגור</button>
  </div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzk8uTd6rvkbWkQEWi-3gIJ5cgxS0w1vTz297IxtHh-M4EA0GEzxBjNJz1-GMXnUOiG/exec';
let appointments = [];
let current = null;

fetch(API+'?action=getData')
.then(r=>r.json())
.then(data=>{
  renderPatients(data.patients);
  appointments = data.appointments;
});

function renderPatients(list){
  const el=document.getElementById('patients');
  list.forEach(p=>{
    let d=document.createElement('div');
    d.className='patient';
    d.innerText=p;
    el.appendChild(d);
  });
  new Sortable(el,{group:{name:'patients',pull:'clone',put:false},delay:200});
}

function openModal(appt){
  current=appt;
  summary.value=appt.Summary||'';
  session.value=appt.SessionNumber;
  paid.checked=appt.IsPaid===true;
  location.value=appt.Location;
  modal.style.display='block';
}

function closeModal(){
  modal.style.display='none';
}

function save(){
  fetch(API+'?action=saveAppointment',{
    method:'POST',
    body:JSON.stringify({
      ID:current.ID,
      Summary:summary.value,
      SessionNumber:Number(session.value),
      IsPaid:paid.checked,
      Location:location.value
    })
  }).then(()=>closeModal());
}
</script>
</body>
</html>
