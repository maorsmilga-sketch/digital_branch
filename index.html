<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArcWiz Pro - ניהול קליניקה</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; }
.calendar-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
.time-slot { min-height: 90px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; }
.appointment-item { cursor: pointer; font-size: 0.75rem; padding: 6px; border-radius: 8px; color: white; text-align: center; font-weight: 700; }
.status-paid { background: linear-gradient(135deg,#10b981,#059669); }
.status-unpaid { background: linear-gradient(135deg,#ef4444,#dc2626); }
</style>
</head>

<body class="text-slate-800">

<div class="flex min-h-screen">
<aside class="w-64 bg-white p-4 border-l">
<h2 class="font-bold mb-4">מטופלים</h2>
<div id="patientList" class="space-y-2"></div>
</aside>

<main class="flex-1 p-4">
<div class="calendar-grid" id="scheduleBoard"></div>
</main>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby4OQaXfT4c1zvHjSaNQ0EEWuuwxDJJRkp1CPEhCZooOCl2lk4EQnoD8TdSxfAoirse/exec';

let patients = [], appointments = [];
let currentStartDate = new Date();
let tempApp = null;

function setStartToSunday(d){
  d = new Date(d);
  d.setDate(d.getDate() - d.getDay());
  d.setHours(0,0,0,0);
  return d;
}
currentStartDate = setStartToSunday(new Date());

function createCalendar(){
  const board = document.getElementById('scheduleBoard');
  board.innerHTML = '';

  for(let h=8; h<=20; h++){
    for(let d=0; d<6; d++){
      const date = new Date(currentStartDate);
      date.setDate(date.getDate()+d);
      const key = date.toISOString().split('T')[0];

      const wrap = document.createElement('div');
      wrap.className = 'time-slot p-1';

      wrap.innerHTML = `
        <div class="text-xs text-slate-300">${h}:00</div>
        <div class="slot-container h-full"
             data-date="${key}"
             data-hour="${h}">
        </div>
      `;
      board.appendChild(wrap);
    }
  }
  initDnD();
  renderAppointments();
}

function initDnD(){
  new Sortable(patientList,{
    group:{name:'shared',pull:'clone',put:false},
    sort:false,
    draggable:'.patient-card',
    animation:150
  });

  document.querySelectorAll('.slot-container').forEach(el=>{
    new Sortable(el,{
      group:'shared',
      animation:150,
      onAdd:(evt)=>{
        const name = evt.item.innerText.trim();
        evt.item.remove(); // ✅ קריטי

        tempApp = {
          patientName:name,
          date:evt.target.dataset.date,
          hour:evt.target.dataset.hour
        };

        saveAppointment();
      }
    });
  });
}

async function saveAppointment(){
  await fetch(SCRIPT_URL,{
    method:'POST',
    body:JSON.stringify({
      action:'saveAppointment',
      ...tempApp,
      location:'טירת הכרמל',
      paid:'לא'
    })
  });
  tempApp=null;
  loadData();
}

function renderPatients(){
  patientList.innerHTML='';
  patients.forEach(p=>{
    const d=document.createElement('div');
    d.className='patient-card bg-slate-100 p-2 rounded cursor-grab';
    d.innerText=p.Name;
    patientList.appendChild(d);
  });
}

function renderAppointments(){
  document.querySelectorAll('.slot-container').forEach(s=>s.innerHTML='');
  appointments.forEach(a=>{
    const c=document.querySelector(
      `.slot-container[data-date="${a.Date}"][data-hour="${parseInt(a.Hour)}"]`
    );
    if(!c) return;

    const d=document.createElement('div');
    d.className=`appointment-item ${a.Paid==='כן'?'status-paid':'status-unpaid'}`;
    d.innerText=a.PatientName;
    c.appendChild(d);
  });
}

async function loadData(){
  const r=await fetch(SCRIPT_URL);
  const d=await r.json();
  patients=d.patients;
  appointments=d.appointments;
  renderPatients();
  renderAppointments();
}

createCalendar();
loadData();
</script>

</body>
</html>
