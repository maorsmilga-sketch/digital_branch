<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>AG Grid Advanced Mockup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/ag-grid-community/dist/ag-grid-community.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .ag-theme-alpine { --ag-v-grid-lines-color: #e2e8f0; }
        .canvas-bg { background-color: #f1f5f9; background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 20px 20px; }
        /* עיצוב ה-Switch */
        .mock-switch { width: 34px; height: 20px; background: #cbd5e1; border-radius: 20px; position: relative; display: inline-block; vertical-align: middle; }
        .mock-switch::after { content: ''; position: absolute; width: 16px; height: 16px; background: white; border-radius: 50%; top: 2px; right: 2px; transition: 0.3s; }
        .switch-on { background: #22c55e; }
        .switch-on::after { right: 16px; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans overflow-hidden">

    <header class="bg-indigo-900 text-white p-4 flex justify-between items-center shadow-xl z-20">
        <div class="flex items-center gap-3">
            <span class="text-2xl">🛠️</span>
            <h1 class="text-lg font-black tracking-tight">PRO MOCKUP GENERATOR</h1>
        </div>
        <button onclick="downloadImage()" class="bg-emerald-500 hover:bg-emerald-600 px-6 py-2 rounded-full text-sm font-bold transition-all shadow-lg active:scale-95">
            💾 הורד איור למתכנת (PNG)
        </button>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-96 bg-white shadow-2xl border-l z-10 overflow-y-auto p-6">
            <section class="mb-8">
                <h2 class="text-sm font-bold text-indigo-900 mb-3 border-b pb-1 uppercase tracking-widest">1. הגדרת עמודות</h2>
                <label class="block text-xs text-gray-400 mb-1">הכנס שמות עמודות מופרדים בפסיק:</label>
                <textarea id="colsInput" oninput="initColumnSettings()" class="w-full border-2 border-gray-100 p-3 rounded-lg text-sm h-24 focus:border-indigo-500 outline-none transition-colors">שם, מחיר, תאריך יצירה, פעיל, סטטוס</textarea>
            </section>

            <section id="columnDetailsSection">
                <h2 class="text-sm font-bold text-indigo-900 mb-3 border-b pb-1 uppercase tracking-widest">2. סוגי נתונים ופילטרים</h2>
                <div id="columnSettingsList" class="space-y-4">
                    </div>
            </section>
        </aside>

        <main class="flex-1 p-8 canvas-bg overflow-auto flex flex-col items-center">
            <div id="captureArea" class="bg-white p-8 shadow-2xl rounded-xl w-full max-w-5xl border border-gray-200">
                <div class="mb-6 flex justify-between items-center">
                    <div>
                        <h2 class="text-3xl font-bold text-slate-800" contenteditable="true">כותרת המערכת (לחץ לעריכה)</h2>
                        <p class="text-gray-400 text-sm mt-1">אפיון ויזואלי מבוסס רכיבי AG-Grid</p>
                    </div>
                    <div class="bg-indigo-50 p-3 rounded-lg border border-indigo-100">
                        <span class="text-xs font-bold text-indigo-600">Total Records: 1,240</span>
                    </div>
                </div>

                <div id="myGrid" class="ag-theme-alpine w-full h-[500px] shadow-inner rounded-lg overflow-hidden border border-gray-200"></div>
            </div>
        </main>
    </div>

    <script>
        let gridApi;
        let columnConfig = {};

        // אתחול ההגדרות הראשוניות
        function initColumnSettings() {
            const val = document.getElementById('colsInput').value;
            const names = val.split(',').map(s => s.trim()).filter(s => s !== '');
            const listContainer = document.getElementById('columnSettingsList');
            
            // שמירת הגדרות קיימות כדי לא לאפס כל פעם
            const oldConfig = {...columnConfig};
            columnConfig = {};

            listContainer.innerHTML = names.map(name => {
                columnConfig[name] = oldConfig[name] || { type: 'text', filter: true };
                return `
                    <div class="p-3 bg-gray-50 rounded-lg border border-gray-100">
                        <div class="font-bold text-sm text-gray-700 mb-2">${name}</div>
                        <div class="grid grid-cols-2 gap-2">
                            <select onchange="updateColType('${name}', this.value)" class="text-xs border p-1 rounded">
                                <option value="text" ${columnConfig[name].type === 'text' ? 'selected' : ''}>טקסט חופשי</option>
                                <option value="currency" ${columnConfig[name].type === 'currency' ? 'selected' : ''}>מחיר (₪)</option>
                                <option value="date" ${columnConfig[name].type === 'date' ? 'selected' : ''}>תאריך</option>
                                <option value="boolean" ${columnConfig[name].type === 'boolean' ? 'selected' : ''}>Switch/פעיל</option>
                                <option value="status" ${columnConfig[name].type === 'status' ? 'selected' : ''}>סטטוס (Tag)</option>
                            </select>
                            <label class="flex items-center gap-1 text-[10px] text-gray-500 font-bold uppercase">
                                <input type="checkbox" ${columnConfig[name].filter ? 'checked' : ''} onchange="updateColFilter('${name}', this.checked)"> פילטר
                            </label>
                        </div>
                    </div>
                `;
            }).join('');

            refreshGrid();
        }

        function updateColType(name, type) {
            columnConfig[name].type = type;
            refreshGrid();
        }

        function updateColFilter(name, isFilter) {
            columnConfig[name].filter = isFilter;
            refreshGrid();
        }

        function refreshGrid() {
            if (!gridApi) return;

            const colDefs = Object.keys(columnConfig).map(name => {
                const cfg = columnConfig[name];
                let def = {
                    headerName: name,
                    field: name,
                    sortable: true,
                    filter: cfg.filter ? getFilterType(cfg.type) : false,
                    floatingFilter: cfg.filter,
                    resizable: true,
                    flex: 1
                };

                // התאמת נראות לפי סוג נתונים
                if (cfg.type === 'currency') {
                    def.valueFormatter = params => params.value ? '₪ ' + params.value.toLocaleString() : '';
                    def.cellClass = 'font-mono text-green-700 font-bold';
                } else if (cfg.type === 'boolean') {
                    def.cellRenderer = params => `<div class="mt-2"><span class="mock-switch ${params.value ? 'switch-on' : ''}"></span></div>`;
                    def.cellClass = 'text-center';
                } else if (cfg.type === 'status') {
                    def.cellRenderer = params => `<span class="bg-blue-100 text-blue-800 text-[10px] px-2 py-1 rounded-full font-bold uppercase">${params.value || 'Pending'}</span>`;
                }

                return def;
            });

            // יצירת נתונים פיקטיביים חכמים
            const rowData = [];
            for (let i = 1; i <= 8; i++) {
                let row = {};
                Object.keys(columnConfig).forEach(name => {
                    const type = columnConfig[name].type;
                    if (type === 'currency') row[name] = Math.floor(Math.random() * 10000);
                    else if (type === 'date') row[name] = `2024-0${i}-12`;
                    else if (type === 'boolean') row[name] = Math.random() > 0.5;
                    else if (type === 'status') row[name] = i % 2 === 0 ? 'Approved' : 'Review';
                    else row[name] = `דוגמה ${i}`;
                });
                rowData.push(row);
            }

            gridApi.setGridOption('columnDefs', colDefs);
            gridApi.setGridOption('rowData', rowData);
        }

        function getFilterType(type) {
            if (type === 'date') return 'agDateColumnFilter';
            if (type === 'currency') return 'agNumberColumnFilter';
            return 'agTextColumnFilter';
        }

        async function downloadImage() {
            const element = document.getElementById('captureArea');
            const canvas = await html2canvas(element, { scale: 2 });
            const link = document.createElement('a');
            link.download = 'system-mockup.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const gridDiv = document.querySelector('#myGrid');
            gridApi = agGrid.createGrid(gridDiv, {
                columnDefs: [],
                rowData: [],
                defaultColDef: { flex: 1, minWidth: 120 }
            });
            initColumnSettings();
        });
    </script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-grid.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community/styles/ag-theme-alpine.css">
</body>
</html>
