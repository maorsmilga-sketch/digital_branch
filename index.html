<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArcWiz Pro - ניהול לו"ז קליניקה</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .calendar-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
        .time-slot { min-height: 100px; border: 1px solid #e2e8f0; border-radius: 12px; background: white; position: relative; display: flex; flex-direction: column; }
        .appointment-item { 
            cursor: pointer; 
            font-size: 0.8rem; 
            padding: 8px 4px; 
            border-radius: 8px; 
            color: white; 
            text-align: center; 
            font-weight: 700; 
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-top: auto;
        }
        .status-paid { background: linear-gradient(135deg, #10b981, #059669); }
        .status-unpaid { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .meeting-badge { background: rgba(255,255,255,0.3); padding: 1px 4px; border-radius: 4px; font-size: 0.65rem; margin-left: 3px; }
        @media (max-width: 768px) { .calendar-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="text-slate-800">

<div class="min-h-screen flex flex-col">
    <nav class="bg-white border-b p-4 sticky top-0 z-50 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-bold text-indigo-600">ArcWiz <span class="text-slate-400 font-light text-sm">Scheduler</span></h1>
        <div class="flex items-center gap-3">
            <button onclick="changeWeek(-1)" class="p-2 hover:bg-slate-100 rounded-full transition">◀</button>
            <span id="currentWeekDisplay" class="font-bold text-sm min-w-[120px] text-center"></span>
            <button onclick="changeWeek(1)" class="p-2 hover:bg-slate-100 rounded-full transition">▶</button>
            <button onclick="goToday()" class="bg-indigo-50 text-indigo-600 px-4 py-1.5 rounded-full text-xs font-bold border border-indigo-100">היום</button>
        </div>
        <div id="loader" class="hidden animate-spin rounded-full h-5 w-5 border-2 border-indigo-600 border-t-transparent"></div>
    </nav>

    <div class="flex flex-col md:flex-row flex-grow container mx-auto gap-4 p-4">
        <aside class="w-full md:w-64 space-y-4">
            <div class="bg-white rounded-2xl p-4 border shadow-sm">
                <h2 class="font-bold text-slate-400 text-[10px] uppercase tracking-widest mb-4">מטופלים (גרור ללוח)</h2>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="newPatientName" placeholder="שם חדש..." class="w-full bg-slate-50 border rounded-lg px-3 py-2 text-sm outline-none focus:ring-2 focus:ring-indigo-400">
                    <button onclick="addPatient()" class="bg-indigo-600 text-white px-3 py-2 rounded-lg hover:bg-indigo-700 transition shadow-md">+</button>
                </div>
                <div id="patientList" class="space-y-2 max-h-[40vh] overflow-y-auto p-1"></div>
            </div>

            <div class="bg-white rounded-2xl p-4 border shadow-sm">
                <h2 class="font-bold text-slate-400 text-[10px] uppercase tracking-widest mb-4">דוחות</h2>
                <select id="exportMonth" class="w-full bg-slate-50 border rounded-lg p-2 text-sm mb-2">
                    <option value="0">ינואר</option><option value="1">פברואר</option><option value="2">מרץ</option>
                    <option value="3">אפריל</option><option value="4">מאי</option><option value="5">יוני</option>
                    <option value="6">יולי</option><option value="7">אוגוסט</option><option value="8">ספטמבר</option>
                    <option value="9">אוקטובר</option><option value="10">נובמבר</option><option value="11">דצמבר</option>
                </select>
                <button onclick="exportToExcel()" class="w-full bg-emerald-600 text-white py-2 rounded-lg font-bold text-xs hover:bg-emerald-700 transition">הורד אקסל חודשי</button>
            </div>
        </aside>

        <main class="flex-grow">
            <div class="calendar-grid text-center font-bold text-slate-400 mb-2 text-[10px] uppercase tracking-widest">
                <div id="head-0">ראשון</div><div id="head-1">שני</div><div id="head-2">שלישי</div>
                <div id="head-3">רביעי</div><div id="head-4">חמישי</div><div id="head-5" class="text-indigo-600 font-black">שישי</div>
            </div>
            <div class="calendar-grid" id="scheduleBoard"></div>
        </main>
    </div>
</div>

<div id="editModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center z-[100] p-4">
    <div class="bg-white rounded-3xl p-6 max-w-lg w-full shadow-2xl border border-white">
        <h3 id="editModalTitle" class="text-xl font-bold mb-6 text-slate-800">פרטי פגישה</h3>
        <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
                <label class="block text-[10px] font-bold text-slate-400 mb-1">מיקום</label>
                <select id="editLocation" class="w-full bg-slate-50 border p-3 rounded-xl text-sm">
                    <option value="טירת הכרמל">טירת הכרמל</option>
                    <option value="עתלית">עתלית</option>
                </select>
            </div>
            <div>
                <label class="block text-[10px] font-bold text-slate-400 mb-1">תשלום</label>
                <select id="editPaid" class="w-full bg-slate-50 border p-3 rounded-xl text-sm font-bold">
                    <option value="לא">לא שולם ❌</option>
                    <option value="כן">שולם ✅</option>
                </select>
            </div>
        </div>
        <div class="mb-4">
            <label class="block text-[10px] font-bold text-slate-400 mb-1">סיכום פגישה</label>
            <textarea id="editSummary" rows="4" class="w-full bg-slate-50 border p-3 rounded-xl text-sm"></textarea>
        </div>
        <div class="mb-6">
            <label class="block text-[10px] font-bold text-slate-400 mb-1">הערות</label>
            <textarea id="editNotes" rows="2" class="w-full bg-slate-50 border p-3 rounded-xl text-sm"></textarea>
        </div>
        <div class="flex gap-3">
            <button onclick="updateAppointmentData()" class="flex-1 bg-indigo-600 text-white py-3 rounded-2xl font-bold hover:bg-indigo-700 transition shadow-lg">שמור</button>
            <button onclick="closeEditModal()" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-2xl font-bold">ביטול</button>
        </div>
    </div>
</div>

<div id="locationModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden items-center justify-center z-[100] p-4">
    <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full text-center shadow-2xl">
        <h3 class="text-2xl font-black mb-2 text-slate-800 tracking-tight">איפה המפגש?</h3>
        <p id="modalInfo" class="text-sm text-slate-400 mb-8 font-medium"></p>
        <div class="grid grid-cols-1 gap-4">
            <button onclick="confirmInitialLocation('טירת הכרמל')" class="bg-indigo-600 text-white py-5 rounded-2xl font-bold text-lg shadow-lg hover:scale-[1.02] transition">טירת הכרמל</button>
            <button onclick="confirmInitialLocation('עתלית')" class="bg-indigo-400 text-white py-5 rounded-2xl font-bold text-lg shadow-lg hover:scale-[1.02] transition">עתלית</button>
            <button onclick="cancelAppointment()" class="text-slate-300 text-sm font-bold hover:text-slate-500 pt-2 transition">ביטול השיבוץ</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'כאן_שמים_את_הקישור_שלך';
    let patients = [], appointments = [], currentStartDate = new Date(), tempApp = null, activeEditApp = null;

    function setStartToSunday(date) {
        const d = new Date(date);
        d.setDate(d.getDate() - d.getDay());
        d.setHours(0,0,0,0);
        return d;
    }
    currentStartDate = setStartToSunday(new Date());

    const daysNames = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי'];
    const workHours = { week: { start: 13, end: 21 }, friday: { start: 8, end: 12 } };

    function createCalendar() {
        const board = document.getElementById('scheduleBoard');
        board.innerHTML = '';
        for(let i=0; i<6; i++) {
            const d = new Date(currentStartDate); d.setDate(d.getDate() + i);
            document.getElementById(`head-${i}`).innerHTML = `${daysNames[i]}<br><span class="text-slate-300 font-normal">${d.getDate()}/${d.getMonth()+1}</span>`;
        }
        document.getElementById('currentWeekDisplay').innerText = `${currentStartDate.getDate()}/${currentStartDate.getMonth()+1} - ${new Date(currentStartDate.getTime() + 5*24*60*60*1000).getDate()}/${currentStartDate.getMonth()+1}`;

        for (let hour = 8; hour <= 20; hour++) {
            for (let dIndex = 0; dIndex < 6; dIndex++) {
                const config = dIndex === 5 ? workHours.friday : workHours.week;
                const d = new Date(currentStartDate); d.setDate(d.getDate() + dIndex);
                const dateKey = d.toISOString().split('T')[0];
                const slotId = `slot-${dateKey}-${hour}`;
                const div = document.createElement('div');
                
                if (hour >= config.start && hour < config.end) {
                    div.className = "time-slot p-1";
                    div.innerHTML = `<span class="text-[8px] text-slate-200 font-black absolute top-1 left-1">${hour}:00</span><div id="${slotId}" data-date="${dateKey}" data-hour="${hour}:00" class="slot-container flex-grow h-full w-full flex flex-col justify-end"></div>`;
                } else { 
                    div.className = "bg-slate-50/50 opacity-20 border border-transparent rounded-xl"; 
                }
                board.appendChild(div);
            }
        }
        initDragAndDrop(); renderAppointments();
    }

    function initDragAndDrop() {
        // רשימת המטופלים (המקור)
        new Sortable(document.getElementById('patientList'), { 
            group: { name:'shared', pull:'clone', put:false }, 
            sort:false, 
            animation:150 
        });

        // המשבצות בלוח (היעד)
        document.querySelectorAll('.slot-container').forEach(el => {
            new Sortable(el, { 
                group: 'shared', 
                animation: 150, 
                onAdd: (evt) => {
                    const patientName = evt.item.innerText.replace('✕','').trim();
                    const date = evt.target.dataset.date;
                    const hour = evt.target.dataset.hour;
                    
                    // מחיקת האלמנט ה"זמני" שגררנו כדי שה-Render יחליף אותו באחד יפה
                    evt.item.parentNode.removeChild(evt.item);
                    
                    tempApp = { patientName, date, hour };
                    document.getElementById('modalInfo').innerText = `${patientName} • ${hour}`;
                    document.getElementById('locationModal').classList.replace('hidden', 'flex');
                }
            });
        });
    }

    async function confirmInitialLocation(loc) {
        document.getElementById('locationModal').classList.replace('flex', 'hidden');
        showLoader(true);
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'saveAppointment', ...tempApp, location: loc, paid: 'לא' }) });
        tempApp = null; 
        loadData(); // טעינה מחדש של הכל כדי לראות את השיבוץ המעוצב
    }

    function renderAppointments() {
        // ניקוי כל המשבצות לפני רינדור מחדש
        document.querySelectorAll('.slot-container').forEach(c => c.innerHTML = '');
        
        appointments.forEach(app => {
            const hourOnly = parseInt(app.Hour);
            const container = document.getElementById(`slot-${app.Date}-${hourOnly}`);
            if (container) {
                const div = document.createElement('div');
                div.className = `appointment-item ${app.Paid === 'כן' ? 'status-paid' : 'status-unpaid'}`;
                div.innerHTML = `<div class="flex items-center justify-center"><span class="meeting-badge">#${app.meetingNum}</span><span>${app.PatientName}</span></div><div class="text-[7px] opacity-80 mt-1">${app.Location}</div>`;
                div.onclick = (e) => {
                    e.stopPropagation();
                    openEditModal(app);
                };
                container.appendChild(div);
            }
        });
    }

    async function loadData() {
        showLoader(true);
        try {
            const res = await fetch(SCRIPT_URL); 
            const data = await res.json();
            patients = data.patients; 
            appointments = data.appointments;
            renderPatients(); 
            renderAppointments();
        } catch (e) { console.error("Error loading data:", e); }
        showLoader(false);
    }

    function openEditModal(app) {
        activeEditApp = app;
        document.getElementById('editModalTitle').innerText = `${app.PatientName} (#${app.meetingNum})`;
        document.getElementById('editLocation').value = app.Location || 'טירת הכרמל';
        document.getElementById('editPaid').value = app.Paid === 'כן' ? 'כן' : 'לא';
        document.getElementById('editSummary').value = app.Summary || '';
        document.getElementById('editNotes').value = app.Notes || '';
        document.getElementById('editModal').classList.replace('hidden', 'flex');
    }

    async function updateAppointmentData() {
        showLoader(true);
        const updated = { 
            ...activeEditApp, 
            action: 'updateAppointment', 
            location: document.getElementById('editLocation').value, 
            paid: document.getElementById('editPaid').value, 
            summary: document.getElementById('editSummary').value, 
            notes: document.getElementById('editNotes').value 
        };
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(updated) });
        closeEditModal(); 
        loadData();
    }

    function renderPatients() {
        const list = document.getElementById('patientList'); 
        list.innerHTML = '';
        patients.forEach(p => {
            list.innerHTML += `<div class="bg-white border p-3 rounded-xl text-sm font-bold flex justify-between items-center cursor-grab hover:bg-slate-50 hover:shadow-sm transition mb-2 shadow-inner"><span>${p.Name}</span><button onclick="deletePatient('${p.ID}')" class="text-slate-200 hover:text-red-500 transition">✕</button></div>`;
        });
    }

    function exportToExcel() {
        const month = parseInt(document.getElementById('exportMonth').value);
        const filtered = appointments.filter(app => new Date(app.Date).getMonth() === month);
        if (filtered.length === 0) return alert("אין פגישות בחודש זה");
        
        const data = filtered.map(a => ({
            "שם מטופל": a.PatientName,
            "תאריך": a.Date,
            "שעה": a.Hour,
            "מיקום": a.Location,
            "מספר מפגש": a.meetingNum,
            "שולם": a.Paid,
            "סיכום": a.Summary
        }));

        const worksheet = XLSX.utils.json_to_sheet(data);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "סיכום");
        XLSX.writeFile(workbook, `Report_${month+1}.xlsx`);
    }

    function closeEditModal() { document.getElementById('editModal').classList.replace('flex', 'hidden'); activeEditApp = null; }
    function cancelAppointment() { tempApp = null; document.getElementById('locationModal').classList.replace('flex', 'hidden'); }
    function changeWeek(n) { currentStartDate.setDate(currentStartDate.getDate() + (n*7)); createCalendar(); loadData(); }
    function goToday() { currentStartDate = setStartToSunday(new Date()); createCalendar(); loadData(); }
    
    async function addPatient() {
        const nameInput = document.getElementById('newPatientName');
        const name = nameInput.value; if(!name) return;
        showLoader(true);
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'addPatient', name }) });
        nameInput.value = ''; loadData();
    }
    
    async function deletePatient(id) { if(confirm('למחוק מטופל?')) { await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ action: 'deletePatient', id }) }); loadData(); } }
    function showLoader(s) { document.getElementById('loader').classList.toggle('hidden', !s); }

    createCalendar(); loadData();
</script>
</body>
</html>
