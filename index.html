
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>הדף בתיקונים</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #222;
    }

    .box {
      text-align: center;
      background: #fff;
      padding: 40px 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      max-width: 500px;
      width: 90%;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 2rem;
    }

    p {
      margin: 0;
      font-size: 1.1rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>הדף בתיקונים</h1>
    <p>אנחנו עובדים על שיפור החוויה ונחזור בקרוב.</p>
  </div>
</body>
</html>

הכנתי לך דף HTML פשוט שמציג שהדף בתיקונים.
