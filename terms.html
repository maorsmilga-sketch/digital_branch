<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תקנון ותנאי שימוש – הסניף הדיגטלי</title>
  <meta name="description" content="תקנון ותנאי שימוש של הסניף הדיגטלי." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #06091a;
      --card: rgba(255, 255, 255, 0.03);
      --text: #e4e7f1;
      --muted: #8b93b8;
      --gold: #f0b429;
      --gold-light: #f7d070;
      --border: rgba(255, 255, 255, 0.06);
      --border-gold: rgba(240, 180, 41, 0.2);
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      --radius: 18px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Heebo", "Segoe UI", Arial, sans-serif;
      direction: rtl;
      color: var(--text);
      background: var(--bg);
      line-height: 1.8;
      text-align: right;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 80% 60% at 20% -10%, rgba(99, 102, 241, 0.12), transparent),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(240, 180, 41, 0.06), transparent);
    }

    a { color: inherit; }
    .container { width: min(1060px, 92%); margin: 0 auto; }

    /* ─── Header ─── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      background: rgba(6, 9, 26, 0.8);
      border-bottom: 1px solid var(--border);
    }

    .navbar {
      min-height: 76px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
    }

    .logo-wrap {
      width: 52px;
      height: 52px;
      border-radius: 14px;
      border: 1px solid var(--border-gold);
      background: linear-gradient(145deg, rgba(240, 180, 41, 0.12), rgba(99, 102, 241, 0.08));
      display: grid;
      place-items: center;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .logo-wrap img {
      width: 84%;
      height: 84%;
      object-fit: contain;
      filter: brightness(1.15) contrast(1.05) drop-shadow(0 2px 8px rgba(0, 0, 0, 0.4));
    }

    .brand-text { display: flex; flex-direction: column; gap: 1px; }
    .brand-name { font-size: 1.04rem; font-weight: 700; color: #fff; }
    .brand-tagline { font-size: 0.78rem; color: var(--muted); }

    .btn-nav {
      display: inline-block;
      padding: 10px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--muted);
      font-weight: 500;
      font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.03);
      transition: 0.2s;
    }

    .btn-nav:hover { color: #fff; background: rgba(255, 255, 255, 0.06); }

    /* ─── Hero ─── */
    .hero { padding: 48px 0 24px; }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #ffffff 40%, var(--gold-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p { color: var(--muted); font-size: 0.95rem; }

    /* ─── Terms Card ─── */
    .terms-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(22px, 3vw, 40px);
      margin-bottom: 32px;
      position: relative;
      animation: fadeUp 0.6s ease both;
    }

    .terms-card::before {
      content: "";
      position: absolute;
      top: -1px;
      left: 15%;
      right: 15%;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(240, 180, 41, 0.2), transparent);
    }

    .intro { color: #c8cce0; margin-bottom: 24px; }
    .intro p { margin-bottom: 4px; }

    .section {
      border-top: 1px solid rgba(255, 255, 255, 0.04);
      padding-top: 18px;
      margin-top: 18px;
    }

    .section h2 {
      font-size: 1.2rem;
      color: #fff;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .section-number {
      color: var(--gold);
      font-weight: 800;
      margin-left: 6px;
    }

    .section p {
      color: #b0b6d0;
      margin-bottom: 6px;
      font-size: 0.97rem;
    }

    /* ─── Footer ─── */
    .footer {
      border-top: 1px solid var(--border);
      background: rgba(6, 9, 26, 0.9);
      padding: 22px 0 24px;
    }

    .footer-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 14px;
      margin-bottom: 10px;
    }

    .footer-links {
      list-style: none;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: var(--muted);
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 0.88rem;
      transition: 0.2s;
    }

    .footer-links a:hover { color: #fff; background: rgba(255, 255, 255, 0.04); }

    .footer-copy {
      color: #4b5278;
      font-size: 0.82rem;
      text-align: center;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 720px) {
      .navbar { padding: 12px 0; }
      .brand-name { font-size: 0.96rem; }
    }

    /* ─── Large Desktop (1200px+) ─── */
    @media (min-width: 1200px) {
      .container { width: min(1200px, 90%); }

      .hero { padding: 64px 0 32px; }
      .hero h1 { font-size: 3rem; }
      .hero p { font-size: 1.02rem; }

      .terms-card { padding: 48px 56px; margin-bottom: 40px; }
      .section h2 { font-size: 1.3rem; }
      .section p { font-size: 1.02rem; }
      .intro p { font-size: 1.02rem; }

      .footer { padding: 32px 0 28px; }
    }

    /* ─── Extra-Large Desktop (1400px+) ─── */
    @media (min-width: 1400px) {
      .container { width: min(1320px, 88%); }
      .terms-card { padding: 56px 68px; }
      .footer { padding: 40px 0 32px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <nav class="navbar container" aria-label="תפריט עליון">
      <a class="brand" href="index.html" aria-label="חזרה לאתר הראשי">
        <span class="logo-wrap">
          <img src="הסניף הדיגטלי.png" alt="לוגו הסניף הדיגטלי" />
        </span>
        <span class="brand-text">
          <span class="brand-name">הסניף הדיגטלי</span>
          <span class="brand-tagline">קהילת פוקר לשחקנים שחושבים קדימה</span>
        </span>
      </a>
      <a class="btn-nav" href="index.html">חזרה לדף הבית</a>
    </nav>
  </header>

  <main class="container">
    <section class="hero">
      <h1>תקנון ותנאי שימוש – הסניף הדיגטלי</h1>
      <p id="terms-updated"></p>
    </section>

    <section class="terms-card" id="terms-card" aria-label="תקנון ותנאי שימוש"></section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-top">
        <a class="brand" href="index.html">
          <span class="logo-wrap">
            <img src="הסניף הדיגטלי.png" alt="לוגו הסניף הדיגטלי" />
          </span>
          <span class="brand-text">
            <span class="brand-name">הסניף הדיגטלי</span>
            <span class="brand-tagline">קהילת פוקר לשחקנים שחושבים קדימה</span>
          </span>
        </a>
        <ul class="footer-links">
          <li><a href="index.html#home">בית</a></li>
          <li><a href="index.html#about">אודות</a></li>
          <li><a href="index.html#content">תוכן</a></li>
          <li><a href="index.html#community">קהילה</a></li>
          <li><a href="join.html">הצטרפות</a></li>
          <li><a href="terms.html" aria-current="page">תקנון ותנאי שימוש</a></li>
        </ul>
      </div>
      <p class="footer-copy">&copy; כל הזכויות שמורות - הסניף הדיגטלי</p>
    </div>
  </footer>

  <script src="terms-content.js"></script>
  <script>
    document.getElementById("terms-updated").textContent = "עודכן לאחרונה: " + TERMS_DATA.lastUpdated;
    document.getElementById("terms-card").innerHTML = renderTermsPageHtml();
  </script>
</body>
</html>
